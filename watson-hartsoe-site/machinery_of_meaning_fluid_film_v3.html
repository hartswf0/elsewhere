function createFilmRenderer(ctx, width = 1920, height = 1080, options = {}) {
  const W = width;
  const H = height;
  const createCanvas = options.createCanvas || null;
  const layerA = createCanvas ? createCanvas(W, H) : null;
  const layerB = createCanvas ? createCanvas(W, H) : null;
  const aCtx = layerA?.getContext?.('2d') || null;
  const bCtx = layerB?.getContext?.('2d') || null;
  const transitionSeconds = 1.45;

  const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
  const mix = (a, b, t) => a + (b - a) * t;
  const inv = (a, b, v) => clamp((v - a) / Math.max(1e-6, b - a));
  const smooth = t => { t = clamp(t); return t * t * (3 - 2 * t); };
  const ease = t => { t = clamp(t); return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; };
  const hash = n => { const x = Math.sin(n * 12.9898 + 78.233) * 43758.5453; return x - Math.floor(x); };

  const windowAlpha = (p, start, end, feather = .04) => smooth(inv(start - feather, start, p)) * (1 - smooth(inv(end, end + feather, p)));

  function sceneAt(time) {
    const t = clamp(time, 0, totalDuration - 0.00001);
    let lo = 0, hi = scenes.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const s = scenes[mid];
      if (t < s.start) hi = mid - 1;
      else if (t >= s.end) lo = mid + 1;
      else return { scene: s, index: mid, local: t - s.start, p: (t - s.start) / s.duration };

    const s = scenes.at(-1);
    return { scene: s, index: scenes.length - 1, local: s.duration, p: 1 };

  function clear(c, color = PAPER, alpha = 1) {
    c.save();
    c.globalAlpha = alpha;
    c.fillStyle = color;
    c.fillRect(0, 0, W, H);
    c.restore();

    c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke(); c.restore();

    c.beginPath();
    if (radius > 0 && c.roundRect) c.roundRect(x, y, w, h, radius); else c.rect(x, y, w, h);
    if (fill) { c.fillStyle = fill; c.fill(); }
    if (stroke) { c.strokeStyle = stroke; c.lineWidth = lw; c.stroke(); }

    c.save(); c.globalAlpha = alpha; c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2);
    if (fill) { c.fillStyle = fill; c.fill(); }
    if (stroke) { c.strokeStyle = stroke; c.lineWidth = lw; c.stroke(); }
    c.restore();
  }
  function text(c, value, x, y, size = 32, weight = 500, color = INK, align = 'left', font = 'Arial', alpha = 1) {
    c.save(); c.globalAlpha = alpha; c.fillStyle = color; c.textAlign = align; c.textBaseline = 'alphabetic';
    c.font = `${weight} ${size}px ${font}`; c.fillText(value, x, y); c.restore();
  }
  function mono(c, value, x, y, size = 16, color = MUTED, align = 'left', alpha = 1, weight = 600) {

    g.addColorStop(.55, 'rgba(255,255,255,0)');

      W*.66, y + amp*.72 + Math.cos(absoluteTime*.18)*34,

    bezier(c, pts, 3.5, ACCENT, .55*alpha);
    c.restore();
    bezier(c, [pts[0],pts[1]+14,pts[2],pts[3]+18,pts[4],pts[5]-22,pts[6],pts[7]+7], 1.2, BLUE, .28*alpha);
    for (let i = 0; i < 7; i++) {

  drone1.type='sine';drone2.type='sine';drone1.frequency.value=36;drone2.frequency.value=54.1;g1.gain.value=.055;g2.gain.value=.018;
  drone1.connect(g1).connect(low);drone2.connect(g2).connect(low);low.connect(master);low.connect(reverb);drone1.start();drone2.start();
  const seconds=8,buffer=audioCtx.createBuffer(2,audioCtx.sampleRate*seconds,audioCtx.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buffer.getChannelData(ch);let brown=0;for(let i=0;i<d.length;i++){brown=brown*.995+(Math.random()*2-1)*.005;d[i]=brown*.55;}}
  const src=audioCtx.createBufferSource();src.buffer=buffer;src.loop=true;const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=430;nf.Q.value=.45;noiseGain=audioCtx.createGain();noiseGain.gain.value=.018;src.connect(nf).connect(noiseGain).connect(master);src.start();
}
function bell(base=.0,amount=.045){if(!audioCtx||state.muted)return;const now=audioCtx.currentTime+.01;[1,2.01,3.99].forEach((r,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=base*r;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(amount/(1+i*.9),now+.08);g.gain.exponentialRampToValueAtTime(.0001,now+3.8+i*.35);o.connect(g).connect(master);o.connect(g).connect(reverb);o.start(now);o.stop(now+4.5);});}
function tune(index){if(!audioCtx)return;const now=audioCtx.currentTime;drone1.frequency.setTargetAtTime(36+index*1.45,now,1.4);drone2.frequency.setTargetAtTime((36+index*1.45)*1.503,now,1.8);bell(146+index*2.1,.035);}

function goScene(i,play=false){i=Math.max(0,Math.min(scenes.length-1,i));state.time=scenes[i].start;state.playing=play;state.last=performance.now();film.renderAtAbsolute(state.time);if(audioCtx)tune(i);}
function update(info){ui.play.textContent=state.playing?'PAUSE':'PLAY';ui.scene.value=String(info.index);ui.scrub.value=String(Math.round(state.time/totalDuration*1000));ui.time.textContent=`${fmt(state.time)} / ${fmt(totalDuration)}`;}
function tick(now){const dt=Math.min(.08,(now-state.last)/1000);state.last=now;if(state.playing){state.time+=dt;if(state.recordEnd!==null&&state.time>=state.recordEnd){state.time=state.recordEnd;stopRecord();}if(state.time>=totalDuration){state.time=totalDuration;state.playing=false;}}const info=film.renderAtAbsolute(state.time);if(info.index!==state.lastScene){state.lastScene=info.index;state.lastQuote=false;if(audioCtx)tune(info.index);}const q=info.p>=.64;if(q&&!state.lastQuote){state.lastQuote=true;if(audioCtx)bell(196+info.index*1.7,.024);}update(info);requestAnimationFrame(tick);}

ui.play.onclick=async()=>{await ensureAudio();state.playing=!state.playing;state.last=performance.now();};
ui.prev.onclick=()=>goScene(film.sceneAt(state.time).index-1,false);
ui.next.onclick=()=>goScene(film.sceneAt(state.time).index+1,false);
ui.scene.onchange=()=>goScene(Number(ui.scene.value),false);
ui.sound.onclick=async()=>{await ensureAudio();state.muted=!state.muted;master.gain.setTargetAtTime(state.muted?0:.105,audioCtx.currentTime,.25);ui.sound.textContent=`SOUND ${state.muted?'OFF':'ON'}`;};
ui.scrub.oninput=()=>{state.time=Number(ui.scrub.value)/1000*totalDuration;state.playing=false;};
document.addEventListener('keydown',async e=>{if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;if(e.code==='Space'){e.preventDefault();await ensureAudio();state.playing=!state.playing;}else if(e.key==='ArrowRight')goScene(film.sceneAt(state.time).index+1,false);else if(e.key==='ArrowLeft')goScene(film.sceneAt(state.time).index-1,false);});

async function startRecord(){await ensureAudio();const info=film.sceneAt(state.time);state.time=info.scene.start;state.recordEnd=info.scene.end;state.playing=true;state.recording=true;state.chunks=[];const stream=new MediaStream([...canvas.captureStream(60).getVideoTracks(),...recordDest.stream.getAudioTracks()]);const opts=[{mimeType:'video/webm;codecs=vp9,opus',videoBitsPerSecond:18000000},{mimeType:'video/webm;codecs=vp8,opus',videoBitsPerSecond:14000000},{mimeType:'video/webm'}].find(o=>MediaRecorder.isTypeSupported(o.mimeType))||{};state.recorder=new MediaRecorder(stream,opts);state.recorder.ondataavailable=e=>{if(e.data?.size)state.chunks.push(e.data)};state.recorder.onstop=()=>{const blob=new Blob(state.chunks,{type:'video/webm'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`machinery_of_meaning_${info.scene.number}_${info.scene.id}_fluid.webm`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),30000);};state.recorder.start(1000);ui.record.textContent='STOP';}
function stopRecord(){if(!state.recording)return;state.recording=false;state.playing=false;state.recordEnd=null;if(state.recorder?.state!=='inactive')state.recorder.stop();ui.record.textContent='RECORD CHAPTER';}
ui.record.onclick=()=>state.recording?stopRecord():startRecord();

function resize(){const ar=W/H;if(innerWidth/innerHeight>ar){canvas.style.height=innerHeight+'px';canvas.style.width=innerHeight*ar+'px';}else{canvas.style.width=innerWidth+'px';canvas.style.height=innerWidth/ar+'px';}}
addEventListener('resize',resize);resize();
let idleTimer;const wake=()=>{document.body.classList.remove('idle');clearTimeout(idleTimer);idleTimer=setTimeout(()=>document.body.classList.add('idle'),3200)};['pointermove','pointerdown','keydown','touchstart'].forEach(ev=>addEventListener(ev,wake,{passive:true}));wake();
const requested=query.get('scene');if(requested){const idx=/^\d+$/.test(requested)?Number(requested):scenes.findIndex(s=>s.id===requested);if(idx>=0)state.time=scenes[Math.min(idx,scenes.length-1)].start;}if(query.get('autoplay')==='1'&&query.get('render')!=='1')state.playing=true;
window.MOM_FILM_API={scenes,totalDuration,renderAtAbsolute:film.renderAtAbsolute,sceneAt:film.sceneAt};
film.renderAtAbsolute(state.time);requestAnimationFrame(tick);
})();
</script>
