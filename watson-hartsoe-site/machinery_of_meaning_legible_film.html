    button:disabled{opacity:.35}

    @media(max-width:700px){

      button,select{padding:8px 9px;font-size:10px}
      #time{width:100%;margin:0}
    }
  </style>
</head>

  function clamp(v,a=0,b=1){ return Math.max(a,Math.min(b,v)); }

  function phaseAlpha(p, holdStart, holdEnd, fade=.025){
    const fadeIn=smooth(invLerp(holdStart-fade,holdStart,p));

    return clamp(fadeIn*fadeOut);

  // Time-based crossfade. startSec/holdSec/fade are LOCAL seconds within the
  // scene, so every slide change holds and crossfades for the same wall-clock
  // duration no matter how long the scene is — the rhythm stays even across the
  // whole film instead of speeding up and down with each scene's length.
  function readAlpha(scene, p, startSec, holdSec, fade=0.9){
    const local=p*scene.duration;
    const fadeIn=smooth(invLerp(startSec-fade,startSec,local));
    const fadeOut=1-smooth(invLerp(startSec+holdSec,startSec+holdSec+fade,local));
    return clamp(fadeIn*fadeOut);
  }

    mono('FLEXIBILITY IS NOT ROBUSTNESS.',960,920,22,INK,'center',verdict);
    finalTitle(s,p);
  }

  function drawDeepPlay(s,p,t){
    clear(PAPER);
    const a=smooth(invLerp(.04,.18,p));
    const cx=W/2,cy=520;
    circle(cx,cy,250,WHITE,INK,10,a);circle(cx,cy,135,null,RED,10,a);
    const nodes=[];
    for(let i=0;i<14;i++){
      const ang=i/14*Math.PI*2,rr=390+(i%3)*55;
      nodes.push([cx+Math.cos(ang)*rr,cy+Math.sin(ang)*rr*.78]);
    }
    nodes.forEach((n,i)=>{
      const b=nodes[(i*5+3)%nodes.length];
      line(n[0],n[1],b[0],b[1],2,MUTED,a*.35);
    });
    nodes.forEach((n,i)=>circle(n[0],n[1],24,i%3===0?RED:INK,INK,3,a));
    for(let i=0;i<8;i++){
      const q=(p*2+i/8)%1;const n=nodes[i],x=lerp(n[0],cx,q),y=lerp(n[1],cy,q);
      circle(x,y,10,RED,null,0,a);
    }
    const words=['RIVALRY','KINSHIP','WAGER','PUBLIC RISK','STATUS','MEMORY'];
    words.forEach((v,i)=>{const ang=i/words.length*Math.PI*2-.4;const x=cx+Math.cos(ang)*650,y=cy+Math.sin(ang)*390;mono(v,x,y,18,i%2?INK:RED,'center',a);});
    const drama=smooth(invLerp(.34,.60,p));
    poly([[cx,320],[cx+150,520],[cx,720],[cx-150,520]],RED,INK,7,drama);
    mono('STAGED DRAMA',cx,530,20,WHITE,'center',drama);
    finalTitle(s,p);
  }

  function drawAxioms(s,p,t){
    clear(INK);
    const a=smooth(invLerp(.03,.16,p));
    const cols=3,rows=4;
    axioms.forEach((v,i)=>{
      const x=90+(i%cols)*610,y=145+Math.floor(i/cols)*195;
      const aa=smooth(invLerp(.05+i*.025,.18+i*.025,p));
      rect(x,y,530,140,i%4===0?RED:WHITE,WHITE,3,aa);
      wrap(v,x+25,y+48,480,31,20,900,i%4===0?WHITE:INK,'left',3,aa);
    });
    const methods=smooth(invLerp(.45,.63,p));
    const labels=['ETHNOGRAPHY','COMPUTATION','CAUSAL INQUIRY','HISTORY'];
    labels.forEach((v,i)=>{const x=180+i*420;rect(x,930,330,64,i===0?RED:WHITE,WHITE,3,methods);mono(v,x+165,970,16,i===0?WHITE:INK,'center',methods);});
    finalTitle(s,p);
  }

  function drawRoadmap(s,p,t){
    clear(PAPER);
    const a=smooth(invLerp(.04,.18,p));
    const stages=[
      {x:140,w:480,n:'01',t:'PROTOTYPE',d:'SCHEMAS, BENCHMARKS, PAPER TOOLS'},
      {x:720,w:480,n:'02',t:'PILOT',d:'BOUNDED CASES, FIELD TESTS, RED TEAM'},
      {x:1300,w:480,n:'03',t:'FEDERATION',d:'MULTI-SITE GOVERNANCE, REFUSAL GATES'}
    ];
    stages.forEach((st,i)=>{
      const aa=smooth(invLerp(.06+i*.10,.24+i*.10,p));
      rect(st.x,250,st.w,430,i===1?INK:WHITE,INK,7,aa);
      mono(st.n,st.x+40,315,28,i===1?RED:INK,'left',aa);
      text(st.t,st.x+40,430,55,900,i===1?WHITE:INK,'left','Arial',aa);
      wrap(st.d,st.x+40,515,st.w-80,38,25,800,i===1?WHITE:INK,'left',4,aa);
      if(i<2)arrow(st.x+st.w+25,465,stages[i+1].x-25,465,8,RED,aa);
    });
    const ask=smooth(invLerp(.48,.64,p));
    rect(270,770,1380,130,RED,null,0,ask);
    mono('BUILD LESS. TEST HARDER. PUBLISH WITH GOVERNANCE.',960,850,32,WHITE,'center',ask);
    const end=smooth(invLerp(.70,.82,p));
    if(end>0){
      clear(INK);
      const ringP=(t*.15)%1;
      for(let i=0;i<8;i++){const r=130+i*75+ringP*50;circle(W/2,H/2,r,null,i%2?RED:WHITE,4,end*(1-i*.07));}
      text('THE MACHINERY',W/2,470,112,900,WHITE,'center','Arial',end);
      text('OF MEANING',W/2,590,112,900,RED,'center','Arial',end);
      mono('CULTURE HAS MECHANISMS. CULTURE IS NOT A MACHINE.',W/2,690,24,WHITE,'center',end);
      mono('END OF CODED FILM',W/2,930,18,MUTED,'center',end);
    }
  }

  const renderers = {
    boot:drawBoot,circuit:drawCircuit,wink:drawWink,features:drawFeatures,attention:drawAttention,
    patching:drawPatching,hydra:drawHydra,steering:drawSteering,grokking:drawGrokking,
    editing:drawEditing,redteam:drawRedTeam,deepplay:drawDeepPlay,axioms:drawAxioms,roadmap:drawRoadmap
  };

  function renderAtAbsolute(seconds){
    state.currentTime=clamp(seconds,0,totalDuration);
    const info=sceneAt(state.currentTime>=totalDuration?totalDuration-.0001:state.currentTime);
    state.selectedScene=info.index;
    const globalP=state.currentTime/totalDuration;
    const renderer=renderers[info.scene.style]||drawCircuit;
    renderer(info.scene,info.p,state.currentTime);
    if(info.local < info.scene.duration-4.9) drawFrameChrome(info.scene,info.index,globalP);
    drawReadingLayer(info.scene,info.p);
    updateUI(info);
    return info;
  }

  function updateUI(info=sceneAt(state.currentTime)){
    if(renderMode)return;
    ui.scrub.value=String(Math.round(state.currentTime/totalDuration*1000));
    ui.time.textContent=`${fmt(state.currentTime)} / ${fmt(totalDuration)}`;
    ui.select.value=String(info.index);
    ui.play.textContent=state.playing?'Pause':'Play';
    ui.status.textContent=`${state.recording?'RECORDING':'READY'} / CH ${info.scene.number} / ${info.scene.title}`;
  }

  function tick(now){
    const dt=Math.min(.1,(now-state.lastNow)/1000);state.lastNow=now;
    if(state.playing){
      state.currentTime+=dt;
      if(state.recordingStopAt!==null&&state.currentTime>=state.recordingStopAt){state.currentTime=state.recordingStopAt;stopRecording();}
      if(state.currentTime>=totalDuration){state.currentTime=totalDuration;state.playing=false;}
    }
    renderAtAbsolute(state.currentTime);
    requestAnimationFrame(tick);
  }

  function selectScene(index,play=false){
    const i=clamp(index,0,scenes.length-1);state.selectedScene=i;state.currentTime=scenes[i].start;state.playing=play;audioCue(i);renderAtAbsolute(state.currentTime);
  }

  ui.play.addEventListener('click',async()=>{await ensureAudio();state.playing=!state.playing;state.lastNow=performance.now();});
  ui.restart.addEventListener('click',()=>{state.currentTime=0;state.playing=true;audioCue(0);});
  ui.prev.addEventListener('click',()=>selectScene(sceneAt(state.currentTime).index-1,false));
  ui.next.addEventListener('click',()=>selectScene(sceneAt(state.currentTime).index+1,false));
  ui.select.addEventListener('change',()=>selectScene(Number(ui.select.value),false));
  ui.scrub.addEventListener('input',()=>{state.currentTime=Number(ui.scrub.value)/1000*totalDuration;state.playing=false;renderAtAbsolute(state.currentTime);});
  ui.mute.addEventListener('click',()=>{state.muted=!state.muted;ui.mute.textContent=`Sound: ${state.muted?'Off':'On'}`;if(masterGain)masterGain.gain.value=state.muted?0:.16;});
  ui.recordScene.addEventListener('click',()=>recordScope('scene'));
  ui.recordFull.addEventListener('click',()=>recordScope('full'));

  document.addEventListener('keydown',(e)=>{
    if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
    if(e.code==='Space'){e.preventDefault();state.playing=!state.playing;}
    else if(e.key==='ArrowRight')selectScene(sceneAt(state.currentTime).index+1,false);
    else if(e.key==='ArrowLeft')selectScene(sceneAt(state.currentTime).index-1,false);
    else if(e.key.toLowerCase()==='r')recordScope('scene');
    else if(e.key.toLowerCase()==='f')recordScope('full');
  });

  // Minimal procedural audio. The browser recorder captures it with the canvas stream.
  let audioCtx=null,masterGain=null,recordDest=null,droneA=null,droneB=null;
  async function ensureAudio(){
    if(audioCtx){if(audioCtx.state==='suspended')await audioCtx.resume();return;}
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=state.muted?0:.16;
    recordDest=audioCtx.createMediaStreamDestination();
    masterGain.connect(audioCtx.destination);masterGain.connect(recordDest);
    droneA=audioCtx.createOscillator();droneB=audioCtx.createOscillator();
    const ga=audioCtx.createGain(),gb=audioCtx.createGain();ga.gain.value=.12;gb.gain.value=.05;
    droneA.type='sine';droneB.type='triangle';droneA.frequency.value=48;droneB.frequency.value=72;
    droneA.connect(ga).connect(masterGain);droneB.connect(gb).connect(masterGain);droneA.start();droneB.start();
  }
  function audioCue(index){
    if(!audioCtx||state.muted)return;
    const now=audioCtx.currentTime;
    [0,1,2].forEach((k)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=k===2?'square':'sine';o.frequency.value=90+index*7+k*55;
      g.gain.setValueAtTime(0,now+k*.07);g.gain.linearRampToValueAtTime(.12,now+k*.07+.01);g.gain.exponentialRampToValueAtTime(.0001,now+k*.07+.22);
      o.connect(g).connect(masterGain);o.start(now+k*.07);o.stop(now+k*.07+.24);
    });
    droneA.frequency.setTargetAtTime(42+index*2.5,now,.35);
    droneB.frequency.setTargetAtTime(63+index*3.25,now,.4);
  }

  async function recordScope(scope){
    if(state.recording){stopRecording();return;}
    await ensureAudio();
    const info=sceneAt(state.currentTime);
    let start=0,end=totalDuration,name='machinery_of_meaning_full_film';
    if(scope==='scene'){start=info.scene.start;end=info.scene.end;name=`machinery_of_meaning_${info.scene.number}_${info.scene.id}`;}
    state.currentTime=start;state.recordingStopAt=end;state.recordName=name;state.playing=true;state.recording=true;
    const videoStream=canvas.captureStream(60);
    const tracks=[...videoStream.getVideoTracks(),...recordDest.stream.getAudioTracks()];
    const stream=new MediaStream(tracks);
    const options=[
      {mimeType:'video/webm;codecs=vp9,opus',videoBitsPerSecond:18000000},
      {mimeType:'video/webm;codecs=vp8,opus',videoBitsPerSecond:14000000},
      {mimeType:'video/webm',videoBitsPerSecond:12000000}
    ].find(o=>MediaRecorder.isTypeSupported(o.mimeType))||{};
    state.chunks=[];state.recorder=new MediaRecorder(stream,options);
    state.recorder.ondataavailable=e=>{if(e.data&&e.data.size)state.chunks.push(e.data);};
    state.recorder.onstop=()=>{
      const blob=new Blob(state.chunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${state.recordName}.webm`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),30000);
    };
    state.recorder.start(1000);audioCue(scope==='scene'?info.index:0);
    ui.recordScene.textContent='Stop Recording';ui.recordFull.textContent='Stop Recording';
  }
  function stopRecording(){
    if(!state.recording)return;
    state.recording=false;state.playing=false;state.recordingStopAt=null;
    if(state.recorder&&state.recorder.state!=='inactive')state.recorder.stop();
    ui.recordScene.textContent='Record Chapter';ui.recordFull.textContent='Record Full Film';
  }

  function resizeCanvasCSS(){
    const aspect=W/H;let vw=innerWidth,vh=innerHeight;
    if(vw/vh>aspect){canvas.style.height=vh+'px';canvas.style.width=(vh*aspect)+'px';}
    else{canvas.style.width=vw+'px';canvas.style.height=(vw/aspect)+'px';}
  }
  addEventListener('resize',resizeCanvasCSS);resizeCanvasCSS();

  const requestedScene=query.get('scene');
  if(requestedScene){
    const idx=/^\d+$/.test(requestedScene)?Number(requestedScene):scenes.findIndex(s=>s.id===requestedScene);
    if(idx>=0)state.currentTime=scenes[clamp(idx,0,scenes.length-1)].start;
  }
  if(query.get('autoplay')==='1'&&!renderMode)state.playing=true;

  window.MOM_FILM_API={
    scenes,totalDuration,
    renderAtAbsolute,
    selectScene,
    sceneAt,
    metadata(){return {width:W,height:H,totalDuration,scenes:scenes.map(({id,number,title,start,end,duration})=>({id,number,title,start,end,duration}))};}
  };

  renderAtAbsolute(state.currentTime);
  requestAnimationFrame(tick);
})();
</script>
